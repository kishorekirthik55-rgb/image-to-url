<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Image to URL Converter</title>
    <style>
        :root {
            --primary: #2da44e;
            --primary-hover: #2c974b;
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #fff;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: 600;
        }

        input[type="text"], input[type="password"], input[type="file"] {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            background: #21262d;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input[type="file"] {
            padding: 20px;
            border: 2px dashed var(--border);
            text-align: center;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #21262d;
            color: #8b949e;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #21262d;
            border: 1px solid var(--border);
            border-radius: 6px;
            display: none;
        }

        .url-display {
            word-break: break-all;
            background: #0d1117;
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        .preview-img {
            max-width: 100%;
            max-height: 150px;
            display: block;
            margin: 10px auto;
            border-radius: 4px;
        }

        .status {
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Image to URL Converter</h2>
    
    <div class="form-group">
        <label for="token">GitHub Token (ghp_...):</label>
        <input type="password" id="token" placeholder="Paste your ghp_ token here">
    </div>

    <div class="form-group">
        <label for="repo">Storage Repository Path:</label>
        <input type="text" id="repo" placeholder="e.g., kishorekirthik55-rgb/image-storage">
    </div>

    <div class="form-group">
        <label for="imageInput">Select Image File:</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <button id="uploadBtn">Upload & Convert</button>

    <div class="status" id="statusMessage"></div>

    <div class="result-box" id="resultBox">
        <label>Your Public Image URL:</label>
        <div class="url-display" id="urlDisplay"></div>
        <button id="copyBtn" style="background: #30363d;">Copy URL</button>
        <img id="preview" class="preview-img" src="" alt="Preview">
    </div>
</div>

<script>
    const uploadBtn = document.getElementById('uploadBtn');
    const tokenInput = document.getElementById('token');
    const imageInput = document.getElementById('imageInput');
    const repoInput = document.getElementById('repo');
    const statusMessage = document.getElementById('statusMessage');
    const resultBox = document.getElementById('resultBox');
    const urlDisplay = document.getElementById('urlDisplay');
    const copyBtn = document.getElementById('copyBtn');
    const preview = document.getElementById('preview');

    // Auto-load credentials safely from personal browser local cache
    if(localStorage.getItem('gh_secure_token')) tokenInput.value = localStorage.getItem('gh_secure_token');
    if(localStorage.getItem('gh_repo')) repoInput.value = localStorage.getItem('gh_repo');

    uploadBtn.addEventListener('click', async () => {
        const token = tokenInput.value.trim();
        const repo = repoInput.value.trim();
        const file = imageInput.files[0];

        if (!token || !repo || !file) {
            alert('Please provide your Token, Repository Path, and choose an image.');
            return;
        }

        // Save local configuration for layout memory
        localStorage.setItem('gh_secure_token', token);
        localStorage.setItem('gh_repo', repo);

        uploadBtn.disabled = true;
        statusMessage.style.color = '#e1b441';
        statusMessage.innerText = 'Uploading to GitHub...';
        resultBox.style.display = 'none';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64Content = reader.result.split(',')[1];
            const fileExtension = file.name.split('.').pop();
            const filename = `img_${Date.now()}.${fileExtension}`;
            const apiUrl = `https://api.github.com/repos/${repo}/contents/images/${filename}`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `upload: ${filename}`,
                        content: base64Content
                    })
                });

                if (response.ok) {
                    const finalCdnUrl = `https://cdn.jsdelivr.net/gh/${repo}@main/images/${filename}`;
                    statusMessage.style.color = '#2da44e';
                    statusMessage.innerText = 'Upload Complete!';
                    urlDisplay.innerText = finalCdnUrl;
                    preview.src = finalCdnUrl;
                    resultBox.style.display = 'block';
                } else {
                    const errorPayload = await response.json();
                    throw new Error(errorPayload.message || 'Submission failed');
                }
            } catch (error) {
                statusMessage.style.color = '#f85149';
                statusMessage.innerText = `Error: ${error.message}`;
            } finally {
                uploadBtn.disabled = false;
            }
        };
    });

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(urlDisplay.innerText);
        const activeText = copyBtn.innerText;
        copyBtn.innerText = 'Copied!';
        setTimeout(() => copyBtn.innerText = activeText, 2000);
    });
</script>

</body>
</html>
